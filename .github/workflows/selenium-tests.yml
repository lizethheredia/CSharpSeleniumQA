name: Selenium QA Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dependencies
        run: dotnet restore CSharpSeleniumQA.csproj

      - name: Build
        run: dotnet build CSharpSeleniumQA.csproj --no-restore

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        env:
          Headless: true
          Credentials__ValidUsername: ${{ secrets.VALID_USERNAME }}
          Credentials__ValidPassword: ${{ secrets.VALID_PASSWORD }}
        run: dotnet test CSharpSeleniumQA.csproj --no-build

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate ./bin/Debug/net9.0/allure-results --clean -o allure-report

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  bdd-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dependencies
        run: dotnet restore CSharpSeleniumQA.BDD/CSharpSeleniumQA.BDD.csproj

      - name: Build
        run: dotnet build CSharpSeleniumQA.BDD/CSharpSeleniumQA.BDD.csproj --no-restore

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run BDD tests
        env:
          Headless: true
          Credentials__ValidUsername: ${{ secrets.VALID_USERNAME }}
          Credentials__ValidPassword: ${{ secrets.VALID_PASSWORD }}
          AnthropicApiKey: ${{ secrets.ANTHROPIC_API_KEY }}
        run: dotnet test CSharpSeleniumQA.BDD/CSharpSeleniumQA.BDD.csproj --no-build
