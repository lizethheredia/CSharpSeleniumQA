name: Selenium QA Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dependencies
        run: dotnet restore CSharpSeleniumQA.csproj

      - name: Build
        run: dotnet build CSharpSeleniumQA.csproj --no-restore

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        env:
          Headless: true
          Credentials__ValidUsername: ${{ secrets.VALID_USERNAME }}
          Credentials__ValidPassword: ${{ secrets.VALID_PASSWORD }}
          AnthropicApiKey: ${{ secrets.ANTHROPIC_API_KEY }}
        run: dotnet test CSharpSeleniumQA.csproj --no-build

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate ./bin/Debug/net9.0/allure-results --clean -o allure-report

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const allureUrl = "https://lizethheredia.github.io/CSharpSeleniumQA"\;
            const date = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[TEST FAILURE] CI/CD Pipeline failed - ${date}`,
              body: `## Test Failed in CI/CD\n\n**Run:** [View run](${runUrl})\n**Allure Report:** [View report](${allureUrl})\n\n## What to do\n1. Check the Allure report for AI Failure Analysis\n2. Review the screenshot attached to the failing test\n3. Apply the suggested C# fix from Claude\n\n> This issue was created automatically by GitHub Actions`,
              labels: ['bug', 'automated']
            });

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  bdd-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dependencies
        run: dotnet restore CSharpSeleniumQA.BDD/CSharpSeleniumQA.BDD.csproj

      - name: Build
        run: dotnet build CSharpSeleniumQA.BDD/CSharpSeleniumQA.BDD.csproj --no-restore

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run BDD tests
        env:
          Headless: true
          Credentials__ValidUsername: ${{ secrets.VALID_USERNAME }}
          Credentials__ValidPassword: ${{ secrets.VALID_PASSWORD }}
        run: dotnet test CSharpSeleniumQA.BDD/CSharpSeleniumQA.BDD.csproj --no-build
